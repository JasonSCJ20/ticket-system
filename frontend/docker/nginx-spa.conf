# nginx config for the frontend SPA container.
# All unknown paths return index.html so React Router can handle them.

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve pre-compressed assets when available.
    gzip_static on;

    # Aggressive caching for hashed assets; no cache for index.html.
    location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }

    # SPA catch-all: any route that doesn't match a file gets index.html.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
