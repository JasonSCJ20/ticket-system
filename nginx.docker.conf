# nginx reverse-proxy config for Docker Compose (docker-compose.prod.yml).
# Container DNS: node-api:8001 (Node backend), frontend:80 (React static build).
# For HTTPS, mount TLS certs into the nginx container and uncomment the SSL block.

upstream node_api {
    server node-api:8001;
    keepalive 32;
}

upstream frontend_app {
    server frontend:80;
    keepalive 8;
}

server {
    listen 80;
    server_name _;

    # Kubernetes / load-balancer health probe (bypasses auth).
    location = /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # All /api/* traffic → Node backend.
    location /api/ {
        proxy_pass         http://node_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        proxy_read_timeout 60s;
        client_max_body_size 6M;
    }

    # Telegram webhook → Node backend.
    location /webhook/ {
        proxy_pass         http://node_api;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Connection        "";
        client_max_body_size 2M;
    }

    # Everything else → React SPA (frontend nginx).
    location / {
        proxy_pass         http://frontend_app;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   Connection        "";
    }
}

