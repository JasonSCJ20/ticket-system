apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ticket-system.fullname" . }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "ticket-system.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ticket-system.selectorLabels" . | nindent 8 }}
    spec:
      containers:
        - name: {{ .Chart.Name }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          ports:
            - name: http
              containerPort: 8001
              protocol: TCP
          env:
            - name: DATABASE_URL
              value: "postgresql://user:pass@db:5432/ticketdb"
            - name: SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: ticket-secrets
                  key: secret-key
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}