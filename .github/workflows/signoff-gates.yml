name: Sign-off Gates

on:
  workflow_dispatch:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  signoff-quality:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: |
            node-backend/package-lock.json
            frontend/package-lock.json

      - name: Install backend dependencies
        run: |
          cd node-backend
          npm ci

      - name: Run backend tests
        run: |
          cd node-backend
          npm test

      - name: Install frontend dependencies
        run: |
          cd frontend
          npm ci

      - name: Build frontend
        run: |
          cd frontend
          npm run build

      - name: Audit backend dependencies (high+)
        run: |
          cd node-backend
          npm audit --audit-level=high
