# nginx production configuration for Cybersecurity Command Centre
# Place at /etc/nginx/sites-available/ccc and symlink to sites-enabled/.
#
# Prerequisites:
#   1. Obtain TLS cert:  certbot --nginx -d your-domain.example.com
#   2. Replace YOUR_DOMAIN with your actual domain.
#   3. Reload nginx:     sudo nginx -t && sudo systemctl reload nginx

server {
    listen 80;
    server_name YOUR_DOMAIN;

    # Redirect all HTTP to HTTPS.
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    server_name YOUR_DOMAIN;

    # TLS — populated by certbot or your cert provider.
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache   shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers (complements helmet on the Node side).
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # ----------------------------------------------------------------
    # 1. Proxy all /api/* requests to the Node backend.
    # ----------------------------------------------------------------
    location /api/ {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_set_header   Upgrade           $http_upgrade;
        proxy_set_header   Connection        keep-alive;
        proxy_read_timeout 60s;
        proxy_send_timeout 60s;
        client_max_body_size 6M;
    }

    # ----------------------------------------------------------------
    # 2. Proxy Telegram webhook to backend.
    # ----------------------------------------------------------------
    location /webhook/telegram {
        proxy_pass         http://127.0.0.1:8001;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        client_max_body_size 2M;
    }

    # ----------------------------------------------------------------
    # 3. Serve the React production build (vite build output).
    # ----------------------------------------------------------------
    root /var/www/ccc/frontend/dist;
    index index.html;

    location / {
        try_files $uri $uri/ /index.html;
        # Cache static assets aggressively but never cache index.html.
        location ~* \.(js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
        }
    }

    # Deny access to hidden files.
    location ~ /\. {
        deny all;
    }
}
