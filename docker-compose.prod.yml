# Production Docker Compose
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#
# Required env vars set in a .env file (never commit it):
#   SECRET_KEY, ADMIN_USERNAME, ADMIN_PASSWORD, DATABASE_URL,
#   EMAIL_USER, EMAIL_PASS, TELEGRAM_BOT_TOKEN, TELEGRAM_CHAT_ID
#
# DATABASE_URL example for the bundled postgres service:
#   DATABASE_URL=postgresql://ccc:strongpassword@postgres:5432/ccc_prod

version: '3.9'

services:

  # ----------------------------------------------------------------
  # PostgreSQL database
  # ----------------------------------------------------------------
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ccc_prod
      POSTGRES_USER: ${POSTGRES_USER:-ccc}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?POSTGRES_PASSWORD must be set}
    volumes:
      - pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-ccc} -d ccc_prod"]
      interval: 10s
      timeout: 5s
      retries: 5
    # NOT exposed on host — only reachable by other containers.

  # ----------------------------------------------------------------
  # Node/Express API
  # ----------------------------------------------------------------
  node-api:
    build:
      context: ./node-backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 8001
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL must be set}
      SECRET_KEY: ${SECRET_KEY:?SECRET_KEY must be set}
      ADMIN_USERNAME: ${ADMIN_USERNAME:?ADMIN_USERNAME must be set}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:?ADMIN_PASSWORD must be set}
      EMAIL_USER: ${EMAIL_USER:-}
      EMAIL_PASS: ${EMAIL_PASS:-}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN:-}
      TELEGRAM_CHAT_ID: ${TELEGRAM_CHAT_ID:-}
    # NOT exposed on host — traffic goes through nginx.
    healthcheck:
      test: ["CMD-SHELL", "node -e \"require('http').get('http://127.0.0.1:8001/api/health', r => process.exit(r.statusCode === 200 ? 0 : 1)).on('error', () => process.exit(1))\""]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  # ----------------------------------------------------------------
  # Frontend (React static build served by nginx)
  # ----------------------------------------------------------------
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped

  # ----------------------------------------------------------------
  # nginx reverse proxy — the only publicly exposed container.
  # ----------------------------------------------------------------
  nginx:
    image: nginx:1.27-alpine
    restart: unless-stopped
    depends_on:
      - node-api
      - frontend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx.docker.conf:/etc/nginx/conf.d/default.conf:ro
      - ./ssl:/etc/nginx/ssl:ro
      - nginx_logs:/var/log/nginx

volumes:
  pg_data:
  nginx_logs:
